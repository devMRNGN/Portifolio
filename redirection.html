<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Portifólio</title>
        <style>
            body{
                margin: 0;
                box-sizing: border-box;
                background-color: #778899;
                color: #2c2c2c;
            }
            .container{
                display: flex;
                flex-direction: column;
                height: 99.8vh;
                align-items: center;
                justify-content: center;
            }

            button {
                font-size: 60px;
                background-color: #3b5998;
                width: 30rem;
                height: 8rem;
                border-radius: 40px;
                border: solid 3px #3f3f3f;
                color: #2c2c2c;
            }

            header > h1{
                font-size: 80px;
            }

            blockquote{
                text-align: center;
                font-size: 30px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Portifólio do João Marangoni</h1>
            </header>
            <main>
                    <button onclick="window.location.href = 'home.html'">Ir para o ínicio</button>
            </main>
            <footer>
                <blockquote>
                    Direitos reservados <br>
                    <cite>DevMRNGN</cite>
                </blockquote>
            </footer>
        </div>
    </body>
</html>
