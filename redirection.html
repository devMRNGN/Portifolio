<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Portifólio</title>
        <style>
            body{
                margin: 0;
                box-sizing: border-box;
                background-color: #e5e5e5;
                color: #2c2c2c;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 99.8vh;
                font-family: 'Courier New', Courier, monospace;
            }
            .container{
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: space-around;
                background-color: white;
                width: 60%;
                border: 4px #cccccc solid;
                border-radius: 30px;
                height: 600px;
            }

            button {
                font-family: 'Courier New', Courier, monospace;
                font-size: 80px;
                width: 30rem;
                height: 8rem;
                text-align: center;
                border-radius: 30px;
                border: 1.5px solid #ff5232;
                background-color: #ff7b5a;
                color: white;
            }

            button:hover{
                color: black;
                -webkit-transform: scale(1.1);
                -ms-transform: scale(1.1);
                transform: scale(1.1);
            }

            header > h1{
                font-size: 65px;
            }

            blockquote{
                text-align: center;
                font-size: 30px;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Portifólio: João Marangoni</h1>
            </header>
            <main>
                    <button>Homepage</button>
            </main>
            <footer>
                <blockquote>
                    Direitos reservados <br>
                    <cite>DEVMRNGN</cite>
                </blockquote>
            </footer>
        </div>
        <script>
            const button = document.querySelector('main > button');
            button.onclick = () => window.location.href = 'home.html';
        </script>
    </body>
</html>
